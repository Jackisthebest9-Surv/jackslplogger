name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip source
        run: unzip LPDiscordLogger-src.zip
      - name: Build with Maven
        run: cd LPDiscordLogger && mvn package -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: LPDiscordLogger
          path: LPDiscordLogger/target/LPDiscordLogger-1.0.0.jar
